<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>로그인 - Figtree Club</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Manrope:wght@600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000", "on-primary": "#ffffff", "secondary": "#5e5e5e",
                        "surface": "#fcf9f8", "background": "#fcf9f8", "on-background": "#1c1b1b",
                        "on-surface": "#1c1b1b", "outline-variant": "#cfc4c5", "outline": "#7e7576",
                        "surface-container-low": "#f6f3f2", "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a", "on-error": "#ffffff", "inverse-surface": "#313030",
                        "inverse-on-surface": "#f3f0ef", "surface-container": "#f0eded"
                    },
                    fontFamily: { "headline-lg": ["Manrope"], "body-sm": ["Inter"], "display-lg": ["Manrope"], "title-md": ["Manrope"], "body-lg": ["Inter"] },
                    fontSize: {
                        "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "title-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }]
                    },
                    spacing: { "container-max": "1440px", "stack-sm": "8px", "stack-md": "16px", "stack-lg": "32px", "margin-mobile": "20px", "margin-desktop": "64px" }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
    <!-- Header -->
    <header class="bg-surface border-b border-outline-variant w-full h-20 flex items-center px-margin-mobile md:px-margin-desktop">
        <div class="max-w-container-max mx-auto w-full flex justify-between items-center">
            <a class="font-headline-lg text-headline-lg font-black tracking-tighter text-primary" href="index.html">Figtree Club</a>
            <a class="text-secondary font-title-md text-sm hover:text-primary transition-colors" href="signup.html">계정이 없으신가요? <span class="text-primary underline">회원가입</span></a>
        </div>
    </header>

    <!-- Login Form -->
    <main class="flex-1 flex items-center justify-center px-margin-mobile py-stack-lg">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <h1 class="font-display-lg text-display-lg text-primary mb-3">로그인</h1>
                <p class="font-body-lg text-body-lg text-secondary">계정에 로그인하고 쇼핑을 시작하세요.</p>
            </div>

            <form id="loginForm" class="flex flex-col gap-5">
                <div>
                    <label class="block text-sm font-semibold text-primary mb-1" for="email">이메일</label>
                    <input class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" id="email" placeholder="example@email.com" required type="email">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-primary mb-1" for="password">비밀번호</label>
                    <input class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" id="password" placeholder="비밀번호를 입력하세요" required type="password">
                </div>

                <div class="flex justify-between items-center">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input class="rounded border-outline-variant text-primary focus:ring-primary" type="checkbox">
                        <span class="text-sm text-secondary">로그인 유지</span>
                    </label>
                    <a class="text-sm text-secondary hover:text-primary underline" href="#" id="forgotBtn">비밀번호 찾기</a>
                </div>

                <div id="errorMsg" class="hidden text-error text-sm bg-red-50 border border-error/20 rounded-lg px-4 py-3"></div>
                <div id="successMsg" class="hidden text-primary text-sm bg-green-50 border border-green-200 rounded-lg px-4 py-3"></div>

                <button class="w-full bg-primary text-on-primary font-title-md text-title-md py-4 rounded-lg hover:bg-primary/90 transition-colors" id="submitBtn" type="submit">
                    로그인
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant"></div></div>
                <div class="relative flex justify-center"><span class="bg-background px-4 text-sm text-secondary">또는</span></div>
            </div>

            <a class="w-full border border-outline-variant text-primary font-title-md text-sm py-3 rounded-lg hover:bg-surface-container-low transition-colors flex items-center justify-center gap-2" href="signup.html">
                <span class="material-symbols-outlined text-[20px]">person_add</span>
                새 계정 만들기
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = '로그인 중...';

            try {
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;

                successMsg.textContent = '로그인 성공! 메인 페이지로 이동합니다.';
                successMsg.classList.remove('hidden');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (err) {
                let msg = '로그인 중 오류가 발생했습니다.';
                if (err.message.includes('Invalid login')) msg = '이메일 또는 비밀번호가 올바르지 않습니다.';
                else if (err.message.includes('Email not confirmed')) msg = '이메일 인증이 필요합니다. 메일함을 확인해주세요.';
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = '로그인';
            }
        });

        // Forgot password
        document.getElementById('forgotBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');

            if (!email) {
                errorMsg.textContent = '이메일을 먼저 입력해주세요.';
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                const { error } = await db.auth.resetPasswordForEmail(email);
                if (error) throw error;
                successMsg.textContent = '비밀번호 재설정 이메일을 보냈습니다. 메일함을 확인해주세요.';
                successMsg.classList.remove('hidden');
                errorMsg.classList.add('hidden');
            } catch (err) {
                errorMsg.textContent = '비밀번호 재설정 이메일 전송에 실패했습니다.';
                errorMsg.classList.remove('hidden');
            }
        });

        // Already logged in? Redirect
        (async () => {
            const { data: { user } } = await db.auth.getUser();
            if (user) window.location.href = 'index.html';
        })();
    </script>
</body>
</html>
