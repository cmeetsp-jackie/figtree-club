<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>회원가입 - Figtree Club</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Manrope:wght@600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000", "on-primary": "#ffffff", "secondary": "#5e5e5e",
                        "surface": "#fcf9f8", "background": "#fcf9f8", "on-background": "#1c1b1b",
                        "on-surface": "#1c1b1b", "outline-variant": "#cfc4c5", "outline": "#7e7576",
                        "surface-container-low": "#f6f3f2", "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a", "on-error": "#ffffff", "inverse-surface": "#313030",
                        "inverse-on-surface": "#f3f0ef", "surface-container": "#f0eded"
                    },
                    fontFamily: { "headline-lg": ["Manrope"], "body-sm": ["Inter"], "display-lg": ["Manrope"], "title-md": ["Manrope"], "body-lg": ["Inter"] },
                    fontSize: {
                        "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "title-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }]
                    },
                    spacing: { "container-max": "1440px", "stack-sm": "8px", "stack-md": "16px", "stack-lg": "32px", "margin-mobile": "20px", "margin-desktop": "64px" }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
    <!-- Header -->
    <header class="bg-surface border-b border-outline-variant w-full h-20 flex items-center px-margin-mobile md:px-margin-desktop">
        <div class="max-w-container-max mx-auto w-full flex justify-between items-center">
            <a class="font-headline-lg text-headline-lg font-black tracking-tighter text-primary" href="index.html">Figtree Club</a>
            <a class="text-secondary font-title-md text-sm hover:text-primary transition-colors" href="login.html">이미 계정이 있으신가요? <span class="text-primary underline">로그인</span></a>
        </div>
    </header>

    <!-- Signup Form -->
    <main class="flex-1 flex items-center justify-center px-margin-mobile py-stack-lg">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <h1 class="font-display-lg text-display-lg text-primary mb-3">회원가입</h1>
                <p class="font-body-lg text-body-lg text-secondary">Figtree Club에 가입하고 프리미엄 도매 번들을 만나보세요.</p>
            </div>

            <form id="signupForm" class="flex flex-col gap-5">
                <div>
                    <label class="block text-sm font-semibold text-primary mb-1" for="name">이름</label>
                    <input class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" id="name" placeholder="이름을 입력하세요" required type="text">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-primary mb-1" for="email">이메일</label>
                    <input class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" id="email" placeholder="example@email.com" required type="email">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-primary mb-1" for="password">비밀번호</label>
                    <input class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" id="password" minlength="6" placeholder="6자 이상 입력하세요" required type="password">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-primary mb-1" for="passwordConfirm">비밀번호 확인</label>
                    <input class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" id="passwordConfirm" minlength="6" placeholder="비밀번호를 다시 입력하세요" required type="password">
                </div>

                <div id="errorMsg" class="hidden text-error text-sm bg-red-50 border border-error/20 rounded-lg px-4 py-3"></div>

                <button class="w-full bg-primary text-on-primary font-title-md text-title-md py-4 rounded-lg hover:bg-primary/90 transition-colors mt-2" id="submitBtn" type="submit">
                    가입하기
                </button>
            </form>

            <p class="text-center text-xs text-secondary mt-6">
                가입 시 <a class="underline hover:text-primary" href="#">서비스 이용약관</a> 및 <a class="underline hover:text-primary" href="#">개인정보 처리방침</a>에 동의합니다.
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            errorMsg.classList.add('hidden');

            if (password !== passwordConfirm) {
                errorMsg.textContent = '비밀번호가 일치하지 않습니다.';
                errorMsg.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '가입 처리 중...';

            try {
                const { data, error } = await db.auth.signUp({
                    email,
                    password,
                    options: { data: { display_name: name } }
                });
                if (error) throw error;

                // Check if email confirmation is required
                if (data.user && data.user.identities && data.user.identities.length === 0) {
                    errorMsg.textContent = '이미 가입된 이메일입니다.';
                    errorMsg.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '가입하기';
                    return;
                }

                document.querySelector('main').innerHTML = `
                    <div class="w-full max-w-md mx-auto text-center py-16">
                        <span class="material-symbols-outlined text-[64px] text-primary mb-4" style="font-variation-settings:'FILL' 1;display:block">mark_email_read</span>
                        <h2 class="font-headline-lg text-headline-lg text-primary mb-3">가입이 완료되었습니다!</h2>
                        <p class="text-secondary mb-8">인증 이메일을 확인해주세요.<br>이메일 인증 후 로그인할 수 있습니다.</p>
                        <a href="login.html" class="bg-primary text-on-primary px-8 py-4 rounded-lg font-title-md text-title-md inline-block hover:bg-primary/90 transition-colors">로그인하기</a>
                    </div>`;
            } catch (err) {
                console.error('Signup error:', err);
                let msg = '가입 중 오류: ' + (err.message || JSON.stringify(err));
                if (err.message?.includes('already registered')) msg = '이미 가입된 이메일입니다.';
                else if (err.message?.includes('valid email')) msg = '유효한 이메일을 입력해주세요.';
                else if (err.message?.includes('at least 6')) msg = '비밀번호는 6자 이상이어야 합니다.';
                else if (err.message?.includes('fetch')) msg = 'Supabase 서버 연결 실패. 네트워크를 확인해주세요.';
                else if (err.message?.includes('signup_disabled')) msg = '회원가입이 비활성화되어 있습니다. Supabase 설정을 확인하세요.';
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = '가입하기';
            }
        });
    </script>
</body>
</html>
